; ============================================================
; LoveBeacon / Whisper — ESP32-C3 PlatformIO 项目配置
; 硬件: 复刻 BeaconOps PCB (ST7789 + LSM6DS3TR-C + MAX98357A)
; ============================================================

[env:esp32-c3-devkitm-1]
platform = espressif32@~6.5.0
board = esp32-c3-devkitm-1
framework = arduino

; ---- 串口监视器 ----
monitor_speed = 115200
upload_speed = 921600

; ---- 编译选项 ----
build_flags =
    -DCORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_INFO
    -DBOARD_HAS_PSRAM=0
    ; 分区表：4MB Flash，更多 SPIFFS 空间
    -DPARTITION_TABLE_CSV_PATH=""

; ---- 依赖库 ----
lib_deps =
    ; 显示驱动
    bodmer/TFT_eSPI@^2.5.43

    ; MQTT 客户端（支持TLS）
    knolleary/PubSubClient@^2.8

    ; JSON 解析
    bblanchon/ArduinoJson@^7.0.0

    ; LSM6DS3TR-C IMU驱动（BeaconOps同款传感器）
    sparkfun/SparkFun LSM6DS3 Arduino Library@^2.0.0

    ; NTP 时间同步
    sstaub/NTPClient@^3.2.1

    ; 系统时间
    paulstoffregen/Time@^1.6.1

    ; WiFi 配网（手机连热点输入密码）
    tzapu/WiFiManager@^2.0.17

; ---- 分区表 ----
board_build.partitions = default_4MB.csv

; ---- 调试选项 ----
debug_tool = esp-builtin
debug_init_break = tbreak setup

; ============================================================
; 编译 deviceA 或 deviceB:
;   修改下面 build_flags 中的 -DDEVICE_ID
;   或者编译时指定:
;   pio run -e esp32-c3-devkitm-1 -t upload --build-property "build_flags=-DDEVICE_ID=\"deviceA\""
; ============================================================
