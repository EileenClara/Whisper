# ============================================================
# LoveBeacon Mosquitto MQTT Broker 配置
# 适用于 Mosquitto 2.x (Ubuntu 22.04)
# ============================================================

# ---- 基础设置 ----
per_listener_settings true

# ---- 内部监听（只监听 localhost，供 FastAPI 后端连接）----
listener 1883 127.0.0.1
protocol mqtt
allow_anonymous true

# ---- TLS 外部监听（供 ESP32 设备连接）----
listener 8883 0.0.0.0
protocol mqtt

# TLS 证书（Let's Encrypt）
# 注意：部署时用 certbot 获取证书后，路径如下：
cafile   /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem
certfile /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem
keyfile  /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem

# TLS 版本
tls_version tlsv1.2

# 外部连接需要用户名密码
allow_anonymous false

# ---- 用户名密码 ----
# 部署后使用: sudo mosquitto_passwd -c /etc/mosquitto/passwd lovebeacon
password_file /etc/mosquitto/passwd

# ---- ACL 权限控制 ----
# 部署后使用此文件限制 topic 访问
acl_file /etc/mosquitto/acl

# ---- 持久化（离线消息由服务端 SQLite 处理，Mosquitto 不负责）----
persistence false

# ---- 日志 ----
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
connection_messages true

# ---- 性能调优 ----
max_keepalive 120
max_inflight_messages 20
max_queued_messages 100
